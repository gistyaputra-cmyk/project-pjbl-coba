<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login Digital Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-tech">

<!-- LOGIN -->
<div id="loginBox" class="login-box">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="error" style="color:red;"></p>
</div>

<!-- MARKET -->
<div id="market" class="section" style="display:none;">
    <h2>Marketplace</h2>

    <!-- SEARCH -->
    <input type="text" id="search" placeholder="Cari produk..." onkeyup="searchProduct()">

    <!-- KATEGORI -->
    <div class="kategori">
        <button onclick="filterKategori('all')">Semua</button>
        <button onclick="filterKategori('ebook')">Ebook</button>
        <button onclick="filterKategori('design')">Design</button>
        <button onclick="filterKategori('app')">Aplikasi</button>
    </div>

    <!-- PRODUK -->
    <div class="products">

        <div class="product" data-name="Ebook Premium" data-kategori="ebook" onclick="showProduct('Ebook Premium')">
            <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794?w=300">
            <p>Ebook Premium</p>
            <small>Rp 50.000</small>
        </div>

        <div class="product" data-name="Ebook Bisnis Online" data-kategori="ebook" onclick="showProduct('Ebook Bisnis Online')">
            <img src="https://images.unsplash.com/photo-1521587760476-6c12a4b040da?w=300">
            <p>Ebook Bisnis Online</p>
            <small>Rp 75.000</small>
        </div>

        <div class="product" data-name="Template Website" data-kategori="design" onclick="showProduct('Template Website')">
            <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=300">
            <p>Template Website</p>
            <small>Rp 100.000</small>
        </div>

        <div class="product" data-name="Desain Logo" data-kategori="design" onclick="showProduct('Desain Logo')">
            <img src="https://images.unsplash.com/photo-1626785774573-4b799315345d?w=300">
            <p>Desain Logo</p>
            <small>Rp 80.000</small>
        </div>

        <div class="product" data-name="UI Kit" data-kategori="design" onclick="showProduct('UI Kit')">
            <img src="https://images.unsplash.com/photo-1559027615-cd4628902d4a?w=300">
            <p>UI Kit</p>
            <small>Rp 120.000</small>
        </div>

        <div class="product" data-name="Aplikasi Kasir" data-kategori="app" onclick="showProduct('Aplikasi Kasir')">
            <img src="https://images.unsplash.com/photo-1556740749-887f6717d7e4?w=300">
            <p>Aplikasi Kasir</p>
            <small>Rp 150.000</small>
        </div>

        <div class="product" data-name="Script Bot" data-kategori="app" onclick="showProduct('Script Bot')">
            <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=300">
            <p>Script Bot</p>
            <small>Rp 90.000</small>
        </div>

        <div class="product" data-name="Game Assets" data-kategori="design" onclick="showProduct('Game Assets')">
            <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?w=300">
            <p>Game Assets</p>
            <small>Rp 110.000</small>
        </div>

        <div class="product" data-name="Preset Foto" data-kategori="design" onclick="showProduct('Preset Foto')">
            <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=300">
            <p>Preset Foto</p>
            <small>Rp 60.000</small>
        </div>

        <div class="product" data-name="Font Premium" data-kategori="design" onclick="showProduct('Font Premium')">
            <img src="https://images.unsplash.com/photo-1586717799252-bd134ad00e26?w=300">
            <p>Font Premium</p>
            <small>Rp 40.000</small>
        </div>

    </div>
</div>

<script src="script.js"></script>

<script>
function login(){
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === "admin" && pass === "1234"){
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("market").style.display = "block";
    } else {
        document.getElementById("error").innerText = "Username atau Password salah!";
    }
}

/* BIAR GAK ERROR KALAU script.js BELUM ADA */
function searchProduct(){}
function filterKategori(){}
function showProduct(){}
</script>

</body>
</html>
